schema_version: v1
profile: default

runtime:
  base_url: https://api.tikomni.com
  auth_env_key: TIKOMNI_API_KEY
  timeout_ms: 60000

platform_adapters:
  douyin:
    u1_primary: /api/u1/v1/douyin/app/v3/fetch_video_high_quality_play_url
    u1_fallback: /api/u1/v1/douyin/web/fetch_video_high_quality_play_url
    u2_asr_submit: /api/u2/v1/services/audio/asr/transcription
    u2_task_poll: /api/u2/v1/tasks/{task_id}
  xiaohongshu:
    u1_primary: /api/u1/v1/xiaohongshu/web/get_note_info_v7
    u1_fallback: /api/u1/v1/xiaohongshu/app/get_note_info
    u2_asr_submit: /api/u2/v1/services/audio/asr/transcription
    u2_task_poll: /api/u2/v1/tasks/{task_id}

content_kind_workflows:
  douyin_video: run_douyin_extract
  xiaohongshu_note: run_xiaohongshu_extract

storage_routes:
  default:
    root_dir: docs/skill-output
    runs_dir: _runs
    results_dir: results
    errors_dir: _errors
  content_kind_card_type:
    single_video: work
    work: work
    author_home: author_sample_work
    author_sample_work: author_sample_work
    author_analysis: author
  card_type_routes:
    work:
      prefix: CBV
      parts:
        - 10-内容系统
        - 15-对标研究
        - 01-作品对标卡
    author:
      prefix: CBA
      parts:
        - 10-内容系统
        - 15-对标研究
        - 03-作者对标卡
    author_sample_work:
      prefix: CBV
      parts:
        - 10-内容系统
        - 15-对标研究
        - 02-作者样本集
        - "{platform}-{author_slug}"
    material:
      prefix: CMAT
      parts:
        - 10-内容系统
        - 12-素材库
        - 素材卡
        - "{year}"
        - "{year_month}"

naming_rules:
  filename_pattern: "{type}-{timestamp}-{job_id}.md"
  card_type_default: work

asr_strategy:
  poll_interval_sec: 3.0
  max_polls: 30
  submit_retry:
    douyin_video:
      max_retries: 2
      backoff_ms: 1500
    xiaohongshu_note:
      max_retries: 0
      backoff_ms: 0

prompt_contracts:
  asr_clean: prompt-contracts/asr-clean.md@v1
  insight: prompt-contracts/insight.md@v1
  benchmark_card:
    选题: prompt-contracts/topic.md@v1
    文风: prompt-contracts/style.md@v1
    Hook: prompt-contracts/hook.md@v1
    结构: prompt-contracts/structure.md@v1
    洞察分析: prompt-contracts/insight.md@v1
