schema_version: v1
profile: default

runtime:
  base_url: "https://api.tikomni.com"
  auth_env_key: "TIKOMNI_API_KEY"
  timeout_ms: 60000

storage_routes:
  default:
    root_dir: ""
    runs_dir: "_runs"
    results_dir: "results"
    errors_dir: "_errors"
  content_kind_card_type:
    single_video: work
    work: work
    author_home: author_sample_work
    author_sample_work: author_sample_work
    author_analysis: author
  card_type_routes:
    work:
      prefix: "CBV"
      parts:
        - "内容系统"
        - "对标研究"
        - "作品卡"
    author:
      prefix: "CBA"
      parts:
        - "内容系统"
        - "对标研究"
        - "作者卡"
    author_sample_work:
      prefix: "CBV"
      parts:
        - "内容系统"
        - "对标研究"
        - "作者样本卡"
        - "{platform}-{author_slug}"

naming_rules:
  card_filename_pattern: "{prefix}-{author_slug}-{title_slug}{ext}"
  json_filename_pattern: "{timestamp}-{platform}-{identifier}{ext}"

asr_strategy:
  poll_interval_sec: 3.0
  max_polls: 30
  submit_retry:
    douyin_video:
      max_retries: 2
      backoff_ms: 1500
    xiaohongshu_note:
      max_retries: 0
      backoff_ms: 0
  u2_timeout_retry:
    enabled: true
    max_retries: 3
