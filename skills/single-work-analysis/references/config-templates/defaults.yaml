schema_version: v1
profile: default

runtime:
  base_url: "https://api.tikomni.com"
  auth_env_key: "TIKOMNI_API_KEY"
  timeout_ms: 60000

storage_routes:
  default:
    root_dir: ""
    runs_dir: "_runs"
    results_dir: "results"
    errors_dir: "_errors"
  content_kind_card_type:
    single_video: work
    note: work
    work: work
  card_type_routes:
    work:
      prefix: "CBV"
      parts:
        - "内容系统"
        - "对标研究"
        - "作品卡"

naming_rules:
  card_filename_pattern: "{prefix}-{platform}-{author_slug}-{title_slug}{ext}"
  json_filename_pattern: "{timestamp}-{platform}-{identifier}{ext}"

analysis:
  provider: auto
  timeout_sec: 90

asr_strategy:
  poll_interval_sec: 3.0
  max_polls: 10
  submit_retry:
    douyin_video:
      max_retries: 2
      backoff_ms: 1500
    xiaohongshu_note:
      max_retries: 0
      backoff_ms: 0
  u2_timeout_retry:
    enabled: true
    max_retries: 0
